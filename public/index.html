<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat WebSocket</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        header {
            padding: 1rem 1.5rem;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        header h1 { font-size: 1.1rem; font-weight: 600; }

        #status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        #status-dot.connected { background: #22c55e; }

        #status-text { font-size: 0.8rem; color: #94a3b8; margin-left: auto; }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .msg.mine { align-self: flex-end; align-items: flex-end; }
        .msg.other { align-self: flex-start; }
        .msg.info { align-self: center; align-items: center; }

        .bubble {
            padding: 0.5rem 0.85rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .msg.mine  .bubble { background: #3b82f6; border-bottom-right-radius: 4px; }
        .msg.other .bubble { background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 4px; }
        .msg.info  .bubble { background: transparent; color: #64748b; font-size: 0.8rem; font-style: italic; }

        .timestamp { font-size: 0.7rem; color: #475569; margin-top: 2px; padding: 0 4px; }

        form {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            background: #1e293b;
            border-top: 1px solid #334155;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #3b82f6; }
        input[type="text"]::placeholder { color: #475569; }

        button {
            padding: 0.6rem 1.2rem;
            border-radius: 0.75rem;
            border: none;
            background: #3b82f6;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background: #2563eb; }
        button:disabled { background: #334155; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <div id="status-dot"></div>
        <h1>Chat WebSocket</h1>
        <span id="status-text">Conectando…</span>
    </header>

    <div id="messages"></div>

    <form id="chat-form">
        <input id="input" type="text" placeholder="Escribí un mensaje…" autocomplete="off" disabled>
        <button id="send-btn" type="submit" disabled>Enviar</button>
    </form>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl    = document.getElementById('input');
        const sendBtn    = document.getElementById('send-btn');
        const statusDot  = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function addMessage(text, type = 'other') {
            const now = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
            const wrapper = document.createElement('div');
            wrapper.className = `msg ${type}`;
            wrapper.innerHTML = `
                <div class="bubble">${escapeHtml(text)}</div>
                ${type !== 'info' ? `<span class="timestamp">${now}</span>` : ''}
            `;
            messagesEl.appendChild(wrapper);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function setConnected(connected) {
            statusDot.className = connected ? 'connected' : '';
            statusText.textContent = connected ? 'Conectado' : 'Desconectado';
            inputEl.disabled  = !connected;
            sendBtn.disabled  = !connected;
            if (connected) inputEl.focus();
        }

        function connect() {
            const ws = new WebSocket(`ws://${location.host}`);

            ws.onopen = () => {
                setConnected(true);
                addMessage('Conectado al servidor', 'info');
            };

            ws.onmessage = ({ data }) => {
                const { type, text } = JSON.parse(data);
                if (type === 'info') addMessage(text, 'info');
                else addMessage(text, 'other');
            };

            ws.onclose = () => {
                setConnected(false);
                addMessage('Desconectado. Reconectando en 3s…', 'info');
                setTimeout(connect, 3000);
            };

            ws.onerror = () => ws.close();

            document.getElementById('chat-form').onsubmit = (e) => {
                e.preventDefault();
                const text = inputEl.value.trim();
                if (!text || ws.readyState !== WebSocket.OPEN) return;
                ws.send(JSON.stringify({ text }));
                addMessage(text, 'mine');
                inputEl.value = '';
            };
        }

        connect();
    </script>
</body>
</html>
